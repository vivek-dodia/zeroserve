name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

# Cancel superseded runs on the same ref (but never cancel tag/release runs).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  CARGO_TERM_COLOR: always

jobs:
  # ---------------------------------------------------------------------------
  # Unit tests (cargo) + end-to-end tests (Deno against the release binary).
  # ---------------------------------------------------------------------------
  test:
    name: Unit + e2e tests (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      # Build deps mirror the Dockerfile. clang/llc are also needed by the
      # clang eBPF compiler mode exercised by the e2e suite.
      - name: Install build & toolchain dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake clang llvm libclang-dev pkg-config
          # Put the unversioned clang/llc/opt from the LLVM bindir on PATH so the
          # `clang`/`llc` invocations in pack.rs resolve.
          echo "$(llvm-config --bindir)" >> "$GITHUB_PATH"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.arch }}

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Build release binary (used by the e2e suite)
        run: cargo build --release --locked

      - name: Unit tests
        run: cargo test --locked

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      # The end-to-end suite compares zeroserve against stock Caddy. Pin a known
      # Caddy commit so behavioral comparisons stay stable across Caddy releases
      # (e.g. precompressed serving changed status via caddyserver/caddy#7040 /
      # #7250). Without this the comparison tests silently skip (no caddy on PATH).
      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install pinned Caddy (for the e2e comparison suite)
        env:
          CADDY_COMMIT: d3986f824d2e82310405d5ca520d61f3e2e701c9
        run: |
          go install "github.com/caddyserver/caddy/v2/cmd/caddy@${CADDY_COMMIT}"
          echo "CADDY_BIN=$(go env GOPATH)/bin/caddy" >> "$GITHUB_ENV"

      # Pebble is Let's Encrypt's test ACME server; the e2e suite uses it (with
      # pebble-challtestsrv as a mock DNS resolver) to exercise automatic
      # TLS-ALPN-01 certificate issuance. Pin a known-good release.
      - name: Install Pebble (for the ACME e2e test)
        env:
          PEBBLE_VERSION: v2.10.1
        run: |
          go install "github.com/letsencrypt/pebble/v2/cmd/pebble@${PEBBLE_VERSION}"
          go install "github.com/letsencrypt/pebble/v2/cmd/pebble-challtestsrv@${PEBBLE_VERSION}"
          echo "PEBBLE_BIN=$(go env GOPATH)/bin/pebble" >> "$GITHUB_ENV"
          echo "PEBBLE_CHALLTESTSRV_BIN=$(go env GOPATH)/bin/pebble-challtestsrv" >> "$GITHUB_ENV"

      # The server isolates itself with unprivileged user namespaces by default.
      # Ubuntu 24.04 runners restrict these via AppArmor; relax it so the server
      # can start during the e2e tests (otherwise `--disable-ns-isolation` would
      # be required, which the tests do not pass).
      - name: Allow unprivileged user namespaces
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Verify scripting toolchain is available
        run: |
          clang --version
          llc --version

      - name: End-to-end tests (tcc)
        working-directory: testing
        env:
          ZEROSERVE_EBPF_COMPILER: tcc
        run: deno test -A --parallel

      - name: End-to-end tests (clang)
        working-directory: testing
        env:
          ZEROSERVE_EBPF_COMPILER: clang
        run: deno test -A --parallel

  # ---------------------------------------------------------------------------
  # Small routing benchmark matrix used as a performance smoke test. This keeps
  # runtime bounded while covering the optimized N=8 / 2-thread / 10ms
  # preemption shape across servers, compilers, protocols, and proxy mode.
  # ---------------------------------------------------------------------------
  benchmark:
    name: Routing benchmarks (n=8, ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install build, benchmark, and toolchain dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake clang llvm libclang-dev pkg-config \
            nginx openssl wrk
          echo "$(llvm-config --bindir)" >> "$GITHUB_PATH"

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: benchmark-${{ matrix.arch }}

      - uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install pinned Caddy
        env:
          CADDY_COMMIT: d3986f824d2e82310405d5ca520d61f3e2e701c9
        run: |
          go install "github.com/caddyserver/caddy/v2/cmd/caddy@${CADDY_COMMIT}"
          echo "CADDY_BIN=$(go env GOPATH)/bin/caddy" >> "$GITHUB_ENV"

      - name: Allow unprivileged user namespaces
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Add benchmark hostnames
        run: |
          echo "127.0.0.1 host0000.bench host0007.bench nomatch.bench" | sudo tee -a /etc/hosts

      - name: Build release binary
        run: cargo build --release --locked

      - name: Routing benchmark matrix
        run: |
          python3 benchmark/routing/ci_matrix.py \
            --duration 3 \
            --runs 1 \
            --caddy-binary "$CADDY_BIN" \
            --nginx-binary /usr/sbin/nginx

  # ---------------------------------------------------------------------------
  # Release binaries for linux/amd64 and linux/arm64, linked against glibc 2.31
  # via cargo-zigbuild. Runs on every push/PR to catch build breaks; artifacts
  # are consumed by the `release` job on tags.
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            zig_target: x86_64-unknown-linux-gnu.2.31
            asset: zeroserve-x86_64-linux
          - target: aarch64-unknown-linux-gnu
            zig_target: aarch64-unknown-linux-gnu.2.31
            asset: zeroserve-aarch64-linux
    steps:
      - uses: actions/checkout@v4

      # Host build scripts still run natively (bindgen needs libclang, boring-sys
      # needs cmake); zig handles the cross C/C++ compilation and linking.
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake clang llvm libclang-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.14.0

      # Pin cargo-zigbuild: 0.23.0 regressed glibc-suffixed target triples
      # (e.g. x86_64-unknown-linux-gnu.2.31), making zig reject the triple with
      # "version '.2.31' ... is invalid". Stay on the last known-good release.
      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild@0.22.3

      - name: Build
        run: cargo zigbuild --release --locked --target ${{ matrix.zig_target }}

      # cargo-zigbuild strips the glibc suffix from the output directory.
      - name: Stage artifact
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/zeroserve" "dist/${{ matrix.asset }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # Multi-arch Docker image assembled from the prebuilt binaries (Dockerfile.dist
  # just copies them in — no recompilation). Pushed to GHCR on main pushes
  # (`latest` plus the full commit SHA) and on tags (semver); pull requests build
  # the image but skip the push, so the assembly is still exercised on every PR.
  # ---------------------------------------------------------------------------
  docker:
    name: Docker image
    needs: [test, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      # buildx COPYs dist/<arch>/zeroserve via TARGETARCH (amd64 | arm64).
      - name: Stage binaries by arch
        run: |
          mkdir -p dist/amd64 dist/arm64
          mv dist/zeroserve-x86_64-linux  dist/amd64/zeroserve
          mv dist/zeroserve-aarch64-linux dist/arm64/zeroserve
          chmod +x dist/amd64/zeroserve dist/arm64/zeroserve

      # Emulation is only needed for the `apt-get install ca-certificates` RUN in
      # the arm64 stage; the binary itself is already built natively.
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long,prefix=,enable={{is_default_branch}}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.dist
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  # ---------------------------------------------------------------------------
  # Publish a GitHub Release with the built binaries when a tag is pushed.
  # ---------------------------------------------------------------------------
  release:
    name: Publish release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [test, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
