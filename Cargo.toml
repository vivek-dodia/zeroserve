[package]
name = "zeroserve"
version = "0.1.0"
edition = "2024"

[profile.release]
panic = "abort"

[dependencies]
arc-swap = "1"
bytes = "1"
monoio = { version = "0.2", default-features = false, features = ["async-cancel", "bytes", "iouring", "utils"] }
monoio-http = { version = "0.3" }
monoio-rustls = { version = "0.4" }
clap = { version = "4", features = ["derive"] }
rustls = { version = "0.23", default-features = false, features = ["std", "tls12", "logging", "aws_lc_rs"] }
anyhow = "1"
http = "1"
libc = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
socket2 = { version = "0.5", features = ["all"] }
struson = { version = "0.6", features = ["serde"] }
url = "2"
webpki-roots = "0.26"
moka = { version = "0.12", features = ["future"] }
signal-hook = "0.3"
tar = "0.4"
